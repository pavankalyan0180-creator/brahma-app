{% extends "base.html" %}
    {% block content %}
    <style>

        .login-box {
            width: 300px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .login-box h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .login-box label {
            display: block;
            margin-bottom: 5px;
            text-align: center;
        }
        .login-box input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 3px;
        }
        .login-box button {
            width: 100%;
            padding: 10px;
            background-color: tomato;
            color: white;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .login-box button:hover {
            background-color: darkred;
        }
        .register {
            text-align: center;
            margin-top: 10px;
        }
        .register button {
            background-color: transparent;
            color: tomato;
            border: none;
            cursor: pointer;
        }
        .register button:hover {
            text-decoration: underline;
        }
    </style>
   

    <div class="login-box">
        <h2>Welcome</h2>
        <form method="post" action="/login">
            <label for="username">👤Username</label>
            <input type="text" id="username" name="username" required>
            <label for="password">🔒Password</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>

        <div class="register">
            <button onclick="window.location.href='/register'">Don't have an account? Register</button>
        </div>

    </div>
    {% endblock %}
